<div class="login-wrapper">
  <div class="login-container">
    <div class="login-header">
      <div class="brand-section">
        <img src="logo.png" alt="Logo" class="brand-icon-img" />
        <h1>AdminSpace</h1>
      </div>
      <p class="mt-2 text-center text-sm text-gray-600">
        Ou
        <a routerLink="/register" class="font-medium text-indigo-600 hover:text-indigo-500">
          créez un nouveau compte
        </a>
      </p>
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label class="form-label required" for="email">Adresse email</label>
        <input
          type="email"
          id="email"
          class="form-input"
          [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          formControlName="email"
          placeholder="admin@exemple.com"
        />
        <div
          class="form-error"
          *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
          Email invalide
        </div>
      </div>

      <div class="form-group">
        <label class="form-label required" for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          class="form-input"
          [class.error]="
            loginForm.get('password')?.invalid && loginForm.get('password')?.touched
          "
          formControlName="password"
          placeholder="••••••••"
        />
        <div
          class="form-error"
          *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        >
          Mot de passe requis
        </div>
      </div>

      <div class="form-group">
        <div class="form-checkbox">
          <input type="checkbox" id="remember" formControlName="remember" />
          <label for="remember">Se souvenir de moi</label>
        </div>
      </div>

      <div
        *ngIf="errorMessage"
        class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"
      >
        {{ errorMessage }}
      </div>

      <div class="form-actions">
        <button
          type="submit"
          class="login-btn btn-primary"
          [disabled]="loginForm.invalid || isLoading"
        >
          <span
            *ngIf="isLoading"
            class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"
          ></span>
          {{ isLoading ? 'Connexion...' : 'Se connecter' }}
        </button>
        <button type="button" class="forgot-btn">Mot de passe oublié ?</button>
      </div>
    </form>
  </div>
</div>
