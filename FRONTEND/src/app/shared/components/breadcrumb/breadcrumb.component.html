<nav class="breadcrumb-nav" aria-label="Breadcrumb">
  <ol class="breadcrumb-list">
    <li class="breadcrumb-item" *ngFor="let breadcrumb of breadcrumbs; let isLast = last">
      <!-- Breadcrumb avec clickHandler -->
      <a 
        *ngIf="breadcrumb.clickHandler && !isLast"
        (click)="breadcrumb.clickHandler(); $event.preventDefault()"
        class="breadcrumb-link"
        style="cursor: pointer;">
        {{ breadcrumb.label }}
      </a>
      <!-- Breadcrumb avec URL -->
      <a 
        *ngIf="!breadcrumb.clickHandler && breadcrumb.url && !isLast"
        [routerLink]="[breadcrumb.url]"
        class="breadcrumb-link">
        {{ breadcrumb.label }}
      </a>
      <!-- Breadcrumb actuel (dernier) -->
      <span *ngIf="isLast" class="breadcrumb-current">{{ breadcrumb.label }}</span>
      
      <svg 
        *ngIf="!isLast" 
        class="breadcrumb-separator"
        width="6" 
        height="10" 
        viewBox="0 0 6 10" 
        fill="currentColor">
        <path d="M1 1l4 4-4 4"/>
      </svg>
    </li>
  </ol>
</nav>
