<header class="header">
  <div class="logo-container">
    <img src="assets/logo.jpg" alt="Logo" class="logo" />
  </div>
  
  <div class="search-section" *ngIf="showSearch">
    <div class="search-bar-container">
      <input 
        type="text" 
        class="search-bar" 
        placeholder="Que désirez-vous aujourd'hui ?"
      />
      <button class="search-button">🔍</button>
    </div>
    
    <div class="header-actions" *ngIf="showActions">
      <button class="action-btn">♡ Mes souhaits</button>
      <button class="action-btn">👤 Me connecter</button>
      <button class="action-btn">🛒 Mon panier</button>
    </div>
  </div>
  
  <div class="title-section" *ngIf="!showSearch">
    <h1>{{ title }}</h1>
  </div>
</header>
