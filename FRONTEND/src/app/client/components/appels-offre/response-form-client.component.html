<!-- Loading state -->
<div *ngIf="loading" class="loading-container">
  <div class="loading-spinner">
    <div class="spinner-ring"></div>
    <span>Chargement en cours...</span>
  </div>
</div>

<ng-container *ngIf="!loading">
  <!-- Appel info banner (compact) -->
  <div *ngIf="appel" class="appel-info-banner">
    <div class="banner-grid">
      <div class="banner-item" *ngIf="appel.emplacement">
        <i class="fas fa-map-marker-alt"></i>
        <span>{{ appel.emplacement.nom }} ({{ appel.emplacement.code }})</span>
      </div>
      <div class="banner-item" *ngIf="appel.emplacement?.surface_m2">
        <i class="fas fa-ruler-combined"></i>
        <span>{{ appel.emplacement?.surface_m2 }} m²</span>
      </div>
      <div class="banner-item" *ngIf="appel.emplacement?.loyer_mensuel">
        <i class="fas fa-money-bill-wave"></i>
        <span>{{ appel.emplacement?.loyer_mensuel | number:'1.0-0' }} Ar/mois</span>
      </div>
      <div class="banner-item" *ngIf="appel.date_deadline">
        <i class="fas fa-calendar-alt"></i>
        <span>Deadline: {{ appel.date_deadline | date:'dd/MM/yyyy' }}</span>
      </div>
    </div>
  </div>

  <!-- Response form -->
  <form class="response-form" (ngSubmit)="submit()">
    <!-- Row 1: Email + Nom boutique -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label"><span class="required">*</span> Adresse e-mail</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" [(ngModel)]="emailProposeur" name="emailProposeur"
            placeholder="votre.email@exemple.com" class="form-input" required />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label"><span class="required">*</span> Nom de la boutique</label>
        <div class="input-wrapper">
          <i class="fas fa-store"></i>
          <input type="text" [(ngModel)]="nomBoutique" name="nomBoutique"
            placeholder="Nom de votre boutique" class="form-input" required />
        </div>
      </div>
    </div>

    <!-- Row 2: Téléphone + Adresse -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <div class="input-wrapper">
          <i class="fas fa-phone"></i>
          <input type="tel" [(ngModel)]="telephoneBoutique" name="telephoneBoutique"
            placeholder="+261 XX XX XX XX" class="form-input" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Adresse</label>
        <div class="input-wrapper">
          <i class="fas fa-location-dot"></i>
          <input type="text" [(ngModel)]="adresseBoutique" name="adresseBoutique"
            placeholder="Adresse de la boutique" class="form-input" />
        </div>
      </div>
    </div>

    <!-- Row 3: Montant (full width) -->
    <div class="form-group form-group-full">
      <label class="form-label"><span class="required">*</span> Montant proposé (Ar)</label>
      <div class="input-wrapper">
        <i class="fas fa-coins"></i>
        <input type="number" [(ngModel)]="montant" name="montant"
          placeholder="Ex: 500000" class="form-input" min="0" required />
        <span class="input-suffix">Ar</span>
      </div>
    </div>

    <!-- Row 4: Message (full width) -->
    <div class="form-group form-group-full">
      <label class="form-label"><span class="required">*</span> Message / Proposition</label>
      <textarea [(ngModel)]="message" name="message"
        placeholder="Décrivez votre projet, vos qualifications, vos atouts..."
        class="form-textarea" rows="5" required></textarea>
      <span class="char-count">{{ message.length }} caractères</span>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="submitted.emit()">
        Annuler
      </button>
      <button type="submit" class="btn-submit" [disabled]="submitting">
        <div class="spinner-ring sm" *ngIf="submitting"></div>
        <i class="fas fa-paper-plane" *ngIf="!submitting"></i>
        <span>{{ submitting ? 'Envoi en cours...' : 'Soumettre la réponse' }}</span>
      </button>
    </div>
  </form>
</ng-container>
