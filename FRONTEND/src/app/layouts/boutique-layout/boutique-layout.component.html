<div class="boutique-layout" [class.sidebar-open]="isSidebarOpen">
  <!-- Overlay cliquable pour fermer le sidebar sur mobile -->
  <div class="overlay" *ngIf="isMobileView && isSidebarOpen" (click)="toggleSidebar()"></div>

  <app-boutique-sidebar [class.sidebar-open]="isSidebarOpen" (closeRequested)="toggleSidebar()"></app-boutique-sidebar>
  <div class="content-area" [class.sidebar-collapsed]="sidebarCollapsed">
    <nav class="navbar">
      <div class="navbar-content">
        <div class="navbar-left">
          <button class="toggle-btn" (click)="toggleSidebar()" title="Toggle menu">
            <div class="burger-icon" [class.active]="isSidebarOpen">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </button>
          <app-breadcrumb class="breadcrumb"></app-breadcrumb>
        </div>
        <div class="navbar-actions">
          <button class="notification-btn" title="Notifications">
            <i class="fas fa-bell"></i>
            <span class="notification-badge">3</span>
          </button>
        </div>
      </div>
    </nav>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
    <app-footer></app-footer>
  </div>
</div>
