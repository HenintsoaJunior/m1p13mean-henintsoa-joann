<aside class="modern-sidebar" [class.sidebar-collapsed]="isCollapsed" [class.sidebar-open]="isMobileView && isSidebarOpen">
  <!-- Header sans toggle -->
  <div class="sidebar-header">
    <div class="brand-section">
      <img src="logo.png" alt="Logo" class="brand-icon-img" *ngIf="!isCollapsed" />
      <div class="brand-icon-small" *ngIf="isCollapsed">
        <img src="logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain" />
      </div>
      <h2 class="brand-title" *ngIf="!isCollapsed">AdminSpace</h2>
    </div>
  </div>

  <!-- Profile section -->
  <div class="profile-section" *ngIf="!isCollapsed">
    <div class="profile-avatar">
      <div class="avatar-circle">👨‍💼</div>
    </div>
    <div class="profile-info">
      <h4>Administrateur</h4>
      <p>Super Admin</p>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-navigation">
    <div class="nav-section">
      <p class="section-title" *ngIf="!isCollapsed">PRINCIPAL</p>

      <a
        routerLink="/admin/dashboard"
        routerLinkActive="active"
        class="nav-item"
        [attr.title]="isCollapsed ? 'Tableau de bord' : null"
        (click)="isMobileView && closeSidebar()"
      >
        <div class="nav-icon">
          <i class="fas fa-tachometer-alt"></i>
        </div>
        <span class="nav-text" *ngIf="!isCollapsed">Tableau de bord</span>
        <div class="nav-indicator" *ngIf="currentRoute === '/admin/dashboard'"></div>
      </a>

      <a
        routerLink="/admin/plan-centre"
        routerLinkActive="active"
        class="nav-item"
        [attr.title]="isCollapsed ? 'Plan Centre Commercial' : null"
        (click)="isMobileView && closeSidebar()"
      >
        <div class="nav-icon">
          <i class="fas fa-map"></i>
        </div>
        <span class="nav-text" *ngIf="!isCollapsed">Plan Centre Commercial</span>
        <div class="nav-indicator" *ngIf="currentRoute === '/admin/plan-centre'"></div>
      </a>

      <a
        routerLink="/admin/centres"
        routerLinkActive="active"
        class="nav-item"
        [attr.title]="isCollapsed ? 'Centres' : null"
        (click)="isMobileView && closeSidebar()"
      >
        <div class="nav-icon">
          <i class="fas fa-store"></i>
        </div>
        <span class="nav-text" *ngIf="!isCollapsed">Centres</span>
        <div class="nav-indicator" *ngIf="currentRoute.startsWith('/admin/centres')"></div>
      </a>

      <a
        routerLink="/admin/utilisateurs"
        routerLinkActive="active"
        class="nav-item"
        [attr.title]="isCollapsed ? 'Utilisateurs' : null"
        (click)="isMobileView && closeSidebar()"
      >
        <div class="nav-icon">
          <i class="fas fa-users"></i>
        </div>
        <span class="nav-text" *ngIf="!isCollapsed">Utilisateurs</span>
        <div class="nav-indicator" *ngIf="currentRoute.startsWith('/admin/utilisateurs')"></div>
      </a>

      <a
        routerLink="/admin/boutiques"
        routerLinkActive="active"
        class="nav-item"
        [attr.title]="isCollapsed ? 'Boutiques' : null"
        (click)="isMobileView && closeSidebar()"
      >
        <div class="nav-icon">
          <i class="fas fa-shopping-bag"></i>
        </div>
        <span class="nav-text" *ngIf="!isCollapsed">Boutiques</span>
        <div class="nav-indicator" *ngIf="currentRoute === '/admin/boutiques'"></div>
      </a>

      <a
        routerLink="/admin/appels"
        routerLinkActive="active"
        class="nav-item"
        [attr.title]="isCollapsed ? 'Appels d\'offre' : null"
        (click)="isMobileView && closeSidebar()"
      >
        <div class="nav-icon">
          <i class="fas fa-bullhorn"></i>
        </div>
        <span class="nav-text" *ngIf="!isCollapsed">Appels d'offre</span>
        <div class="nav-indicator" *ngIf="currentRoute.startsWith('/admin/appels')"></div>
      </a>
    </div>

    <div class="nav-section">
      <p class="section-title" *ngIf="!isCollapsed">ANALYTIQUES</p>

      <a
        routerLink="/admin/reports"
        routerLinkActive="active"
        class="nav-item"
        [attr.title]="isCollapsed ? 'Rapports' : null"
        (click)="isMobileView && closeSidebar()"
      >
        <div class="nav-icon">
          <i class="fas fa-chart-bar"></i>
        </div>
        <span class="nav-text" *ngIf="!isCollapsed">Rapports</span>
        <div class="nav-indicator" *ngIf="currentRoute === '/admin/reports'"></div>
      </a>
    </div>

    <div class="nav-section">
      <p class="section-title" *ngIf="!isCollapsed">SYSTÈME</p>

      <a
        routerLink="/admin/activity-history"
        routerLinkActive="active"
        class="nav-item"
        [attr.title]="isCollapsed ? 'Historique des activités' : null"
        (click)="isMobileView && closeSidebar()"
      >
        <div class="nav-icon">
          <i class="fas fa-history"></i>
        </div>
        <span class="nav-text" *ngIf="!isCollapsed">Historique des activités</span>
        <div class="nav-indicator" *ngIf="currentRoute === '/admin/activity-history'"></div>
      </a>
    </div>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <a
      href="#"
      class="logout-btn"
      [attr.title]="isCollapsed ? 'Déconnexion' : null"
      (click)="onLogout($event); isMobileView && closeSidebar()"
    >
      <div class="nav-icon">
        <i class="fas fa-sign-out-alt"></i>
      </div>
      <span *ngIf="!isCollapsed">Déconnexion</span>
    </a>
  </div>
</aside>
