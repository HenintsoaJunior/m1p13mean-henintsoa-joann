<div class="page-container">
  <!-- Filtres -->
  <div class="filters-section">
    <div class="filters-container">
      <div class="filters-header">
        <i class="fa-solid fa-filter"></i>
        <span>Filtres</span>
      </div>
      <div class="filters-content">
        <div class="search-box">
          <input
            type="text"
            placeholder="Rechercher par nom ou prénom..."
            [(ngModel)]="filtreNom"
            (input)="onFilterChange()"
          />
        </div>

        <div class="search-box">
          <input
            type="text"
            placeholder="Rechercher par email..."
            [(ngModel)]="filtreEmail"
            (input)="onFilterChange()"
          />
        </div>

        <select [(ngModel)]="filtreRole" (ngModelChange)="onFilterChange()" class="form-control">
          <option value="">Tous les rôles</option>
          <option value="admin">Administrateur</option>
          <option value="boutique">Boutique</option>
          <option value="client">Client</option>
        </select>

        <select [(ngModel)]="filtreStatut" (ngModelChange)="onFilterChange()" class="form-control">
          <option value="">Tous les statuts</option>
          <option value="actif">Actif</option>
          <option value="inactif">Inactif</option>
        </select>

        <button class="btn btn-danger" (click)="clearFilters()">Effacer</button>
      </div>
    </div>
  </div>

  <!-- Loading state -->
  <div *ngIf="isLoading" class="loading-container">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <span>Chargement en cours...</span>
    </div>
  </div>

  <ng-container *ngIf="!isLoading">
  <app-table
    [columns]="columns"
    [data]="filteredUtilisateurs"
    [hasActions]="true"
    emptyMessage="Aucun utilisateur trouvé."
    [actionTemplate]="actions"
  >
  </app-table>

  <!-- Pagination -->
  <div class="pagination-container" *ngIf="totalPages >= 1">
    <div class="pagination-info">
      <span>Affichage page {{ currentPage }} sur {{ totalPages }} ({{ totalItems }} résultats)</span>
      <select class="page-size-select" [(ngModel)]="pageSize" (ngModelChange)="onPageSizeChange()">
        <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }} par page</option>
      </select>
    </div>
    <div class="pagination-controls" *ngIf="totalPages > 1">
      <button class="pagination-btn" (click)="goToPage(1)" [disabled]="currentPage === 1" title="Première page">
        <i class="fas fa-angle-double-left"></i>
      </button>
      <button class="pagination-btn" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1" title="Page précédente">
        <i class="fas fa-angle-left"></i>
      </button>
      <button *ngFor="let p of pages" class="pagination-btn" [class.active]="p === currentPage" (click)="goToPage(p)">
        {{ p }}
      </button>
      <button class="pagination-btn" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages" title="Page suivante">
        <i class="fas fa-angle-right"></i>
      </button>
      <button class="pagination-btn" (click)="goToPage(totalPages)" [disabled]="currentPage === totalPages" title="Dernière page">
        <i class="fas fa-angle-double-right"></i>
      </button>
    </div>
  </div>
  </ng-container>
</div>

<ng-template #actions let-utilisateur>
  <label class="switch">
    <input
      type="checkbox"
      [checked]="utilisateur.actif"
      (change)="onStatusChange(utilisateur, $event)"
    />
    <span class="slider round"></span>
  </label>
</ng-template>
